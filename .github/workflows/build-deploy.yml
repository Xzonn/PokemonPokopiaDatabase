name: Build and Deploy to Tencent Cloud COS

on:
  push:
    branches:
      - master
    paths-ignore:
      - .vscode/**/*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v5

      # 2. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 3. Setup Node.js v22
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Build project
      - name: Build project
        run: pnpm run build

      # 6. Setup COSCLI cache
      - name: Cache COSCLI
        id: cache-coscli
        uses: actions/cache@v4
        with:
          path: ~/coscli
          key: ${{ runner.os }}-coscli-v1.0.7
          restore-keys: |
            ${{ runner.os }}-coscli-

      # 7. Download and install COSCLI
      - name: Download and install COSCLI
        if: steps.cache-coscli.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/coscli
          wget --retry-connrefused --waitretry=1 --read-timeout=20 --timeout=15 -t 3 \
            -O ~/coscli/coscli https://github.com/tencentyun/coscli/releases/download/v1.0.7/coscli-v1.0.7-linux-amd64
          chmod +x ~/coscli/coscli

      # 8. Deploy to Tencent Cloud COS
      - name: Deploy to Tencent Cloud COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
        run: |
          ~/coscli/coscli sync out/ cos://"$COS_BUCKET"/ -r --delete --force --secret-id "$COS_SECRET_ID" --secret-key "$COS_SECRET_KEY" --endpoint cos."$COS_REGION".myqcloud.com

  refresh-cdn:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      contents: read

    steps:
      # 1. Create requirements.txt
      - name: Create requirements.txt
        run: echo "tccli" > requirements.txt

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Install TCCLI
      - name: Install TCCLI
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Refresh CDN cache
      - name: Refresh CDN cache
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          tccli cdn PurgePathCache --cli-unfold-argument --Paths "https://${{ vars.TENCENTCLOUD_CDN_DOMAIN }}/" --FlushType flush
